name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install system deps
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev gcc
          version: 1.0

      - name: Install Wails v3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.72

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build Linux binary
        run: |
          export PATH=$PATH:$HOME/go/bin
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -tags production -trimpath \
            -ldflags="-w -s -X main.AppVersion=${{ github.ref_name }}" -o bin/KeyLint .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: KeyLint-linux-amd64
          path: bin/KeyLint

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install system deps
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev gcc gcc-mingw-w64
          version: 1.0

      - name: Install Wails v3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.72

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Generate Windows resource file
        run: |
          export PATH=$PATH:$HOME/go/bin
          wails3 generate syso \
            -arch amd64 \
            -icon build/windows/icon.ico \
            -manifest build/windows/wails.exe.manifest \
            -info build/windows/info.json \
            -out wails_windows_amd64.syso

      - name: Build Windows binary
        run: |
          export PATH=$PATH:$HOME/go/bin
          GOOS=windows GOARCH=amd64 CGO_ENABLED=1 CC=x86_64-w64-mingw32-gcc \
            go build -tags production -trimpath \
            -ldflags="-w -s -H windowsgui -X main.AppVersion=${{ github.ref_name }}" \
            -o bin/KeyLint.exe .

      - name: Install NSIS
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: nsis
          version: 1.0

      - name: Download WebView2 bootstrapper
        run: |
          curl -sSL "https://go.microsoft.com/fwlink/p/?LinkId=2124703" \
            -o build/windows/nsis/MicrosoftEdgeWebview2Setup.exe

      - name: Build NSIS installer
        run: |
          TAG="${{ github.ref_name }}"
          makensis -DARG_WAILS_AMD64_BINARY=../../../bin/KeyLint.exe \
            -DINFO_PRODUCTVERSION="${TAG#v}" \
            build/windows/nsis/project.nsi

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: KeyLint-windows-amd64
          path: bin/KeyLint.exe

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: KeyLint-windows-amd64-installer
          path: bin/KeyLint-amd64-installer.exe

  create-release:
    runs-on: ubuntu-latest
    needs: [ build-linux, build-windows ]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: echo "VERSION=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: KeyLint-linux-amd64
          path: dist/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: KeyLint-windows-amd64
          path: dist/

      - name: Download Windows installer artifact
        uses: actions/download-artifact@v4
        with:
          name: KeyLint-windows-amd64-installer
          path: dist/

      - name: Rename artifacts
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          mv dist/KeyLint "dist/KeyLint-${VERSION}-linux-amd64"
          mv dist/KeyLint.exe "dist/KeyLint-${VERSION}-windows-amd64.exe"
          mv dist/KeyLint-amd64-installer.exe "dist/KeyLint-${VERSION}-windows-amd64-setup.exe"
          chmod +x "dist/KeyLint-${VERSION}-linux-amd64"

      - name: Generate latest.json
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          REPO="0xMMA/KeyLint"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat > dist/latest.json <<EOF
          {
            "version": "${VERSION#v}",
            "notes": "See the release page for details.",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "linux-x86_64": {
                "url": "https://github.com/${REPO}/releases/download/${VERSION}/KeyLint-${VERSION}-linux-amd64",
                "signature": ""
              },
              "windows-x86_64": {
                "url": "https://github.com/${REPO}/releases/download/${VERSION}/KeyLint-${VERSION}-windows-amd64-setup.exe",
                "signature": ""
              }
            }
          }
          EOF

      - name: Detect pre-release tag
        id: prerelease
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" =~ -(alpha|beta|rc) ]]; then
            echo "IS_PRERELEASE=true" >> $GITHUB_OUTPUT
          else
            echo "IS_PRERELEASE=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ steps.prerelease.outputs.IS_PRERELEASE == 'true' }}
          generate_release_notes: true
          files: |
            dist/KeyLint-${{ steps.version.outputs.VERSION }}-linux-amd64
            dist/KeyLint-${{ steps.version.outputs.VERSION }}-windows-amd64.exe
            dist/KeyLint-${{ steps.version.outputs.VERSION }}-windows-amd64-setup.exe
            dist/latest.json
